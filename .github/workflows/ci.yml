name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    # Raven is a macOS product. One job, one platform, no cross-platform theatre.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: gofmt
        working-directory: cli
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "$unformatted"
            exit 1
          fi

      - name: Build
        working-directory: cli
        run: go build ./...

      - name: Vet
        working-directory: cli
        run: go vet ./...

      - name: Test
        working-directory: cli
        run: go test ./...

      - name: No third-party dependencies
        working-directory: cli
        # go.mod must declare only the module and the Go version. This is a
        # deliberate property of the project, not an accident worth drifting on.
        run: |
          if grep -qE '^\s*require' go.mod; then
            echo "::error::go.mod gained a dependency; Raven's CLI is intentionally dependency-free"
            grep -nE '^\s*require' go.mod
            exit 1
          fi

      - name: Markdown links resolve
        # Local-file links only, so this needs no network and cannot flake.
        # Documentation rot is this repo's most common regression.
        #
        # The `|| true` is load-bearing: Actions runs this with `-eo pipefail`,
        # and a markdown file containing no links at all makes the leading grep
        # exit 1, which would kill the step before any link is checked.
        run: |
          rc=0
          while IFS= read -r file; do
            dir="$(dirname "$file")"
            bad="$( { grep -ohE '\]\([^)#][^)]*\)' "$file" || true; } \
              | sed 's/^](//; s/)$//' \
              | { grep -vE '^(https?|mailto):' || true; } \
              | while IFS= read -r link; do
                  target="${link%%#*}"
                  [ -z "$target" ] && continue
                  [ -e "$dir/$target" ] || echo "$link"
                done)"
            if [ -n "$bad" ]; then
              while IFS= read -r link; do
                echo "::error file=$file::broken link -> $link"
              done <<< "$bad"
              rc=1
            fi
          done < <(git ls-files '*.md')
          exit $rc
